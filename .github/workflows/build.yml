name: Build

# Notes on triggers:
#  - pull_request / push to main: regular CI checks for every change.
#  - tags v*.*.*: tag pushes built by a human (or a PAT) trigger a build that attaches the exe.
#  - release: created/published: covers the case where release-please publishes a Release using
#    GITHUB_TOKEN — token-created tag pushes do NOT trigger workflows, but the 'release' event
#    fires when the Release object itself is created, so we get a chance to attach the exe.
#  - workflow_dispatch: lets us manually re-run for a given tag from the Actions tab.
on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*.*.*']
  release:
    types: [created, published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build & attach to its Release (e.g. v0.2.0). Leave blank to just build main.'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # For workflow_dispatch with a tag input, build that tag. Otherwise use the trigger ref.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' && inputs.tag || github.ref }}

      - name: Compile with .NET Framework csc.exe
        shell: pwsh
        run: |
          $csc = Join-Path $env:WINDIR 'Microsoft.NET\Framework64\v4.0.30319\csc.exe'
          if (-not (Test-Path $csc)) { throw "csc.exe not found at $csc" }
          & $csc -nologo -target:winexe -optimize+ -platform:anycpu `
            -reference:System.Windows.Forms.dll `
            -reference:System.Drawing.dll `
            -reference:System.dll `
            -reference:System.Core.dll `
            -reference:Microsoft.VisualBasic.dll `
            -win32icon:ClutterCutter.ico `
            -out:ClutterCutter.exe `
            ClutterCutter.cs
          if ($LASTEXITCODE -ne 0) { throw "csc.exe exited with $LASTEXITCODE" }
          if (-not (Test-Path ClutterCutter.exe)) { throw "ClutterCutter.exe was not produced" }
          $size = (Get-Item ClutterCutter.exe).Length
          Write-Host "Built ClutterCutter.exe ($size bytes)"

      - name: Smoke test (process starts)
        shell: pwsh
        run: |
          $p = Start-Process -FilePath ".\ClutterCutter.exe" -PassThru
          Start-Sleep -Seconds 3
          if ($p.HasExited) {
            throw "ClutterCutter.exe exited immediately with code $($p.ExitCode)"
          }
          Write-Host "Process running: PID=$($p.Id) Title='$($p.MainWindowTitle)'"
          Stop-Process -Id $p.Id -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClutterCutter-${{ github.sha }}
          path: ClutterCutter.exe
          retention-days: 30

      - name: Attach exe to GitHub Release
        if: |
          github.event_name == 'release' ||
          (github.event_name == 'workflow_dispatch' && inputs.tag != '') ||
          startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ClutterCutter.exe
          fail_on_unmatched_files: true
          tag_name: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
